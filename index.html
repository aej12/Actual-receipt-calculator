<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 세후 연봉 계산기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div id="input-screen">
            <h1 class="main-title">2026년 세후 연봉 계산기</h1>
            <p class="subtitle">나의 소득 수준과 실수령액을 확인해보세요.</p>
            
            <div class="input-wrapper">
                <span class="input-label">연봉 입력</span>
                <input type="number" id="salary-input" placeholder="0">
                <span class="unit">만원</span>
            </div>

            <div class="select-row">
                <div class="select-group">
                    <label>부양가족 수</label>
                    <select id="family-count">
                        <option value="1">1명(본인)</option>
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                        <option value="4">4명</option>
                    </select>
                </div>
                <div class="select-group">
                    <label>20세 이하 자녀</label>
                    <select id="child-count">
                        <option value="0">0명</option>
                        <option value="1">1명</option>
                        <option value="2">2명</option>
                    </select>
                </div>
            </div>
            <button class="btn-submit orange-btn" onclick="startCalc()">계산하기</button>
        </div>

        <div id="ad-overlay" style="display: none;">
            <div class="loader"></div>
            <h2 class="ad-title">결과 분석 중...</h2>
            <p class="ad-desc">정확한 계산을 위해 잠시 기다려주세요.</p>
            <a href="https://link.coupang.com/a/d3jyTd" target="_blank" class="ad-btn blue-btn" onclick="linkClick()">결과 확인하기 (쿠팡 이동)</a>
        </div>

        <div id="result-screen" style="display: none;">
            <div class="blog-banner" onclick="window.open('https://blog.naver.com/dowls027', '_blank')">
                더 자세한 정보는 <span class="text-blue">A블로그</span>에서 확인하세요 ➔
            </div>

            <div class="result-card">
                <div class="label-grey">예상 실수령액(월)</div>
                <div class="amount-orange" id="net-pay">0원</div>
                <div class="label-grey-small" id="gross-pay">월 소득액 0원</div>
            </div>

            <div class="percent-card">
                <div class="label-grey" id="percent-label">2026년 중위소득 대비</div>
                <div class="amount-orange" id="median-percent">상위 0%</div>
            </div>

            <div class="detail-list">
                <div class="detail-row"><span>국민연금</span><span id="tax-pension">0원</span></div>
                <div class="detail-row"><span>건강보험</span><span id="tax-health">0원</span></div>
                <div class="detail-row"><span>고용보험</span><span id="tax-emp">0원</span></div>
                <div class="detail-row"><span>근로소득세</span><span id="tax-income">0원</span></div>
                <div class="detail-row point-row">
                    <span>시급 (209시간 기준)</span>
                    <span id="hourly-wage">0원</span>
                </div>
            </div>

            <div class="compare-section">
                <h3 class="chart-title">2026 기준중위소득 추이</h3>
                <div class="chart-box"><canvas id="medianChart"></canvas></div>
                <div class="table-container">
                    <table id="median-table">
                        <thead>
                            <tr><th>구분</th><th>1인</th><th>2인</th><th>3인</th><th>4인</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <button class="btn-reset" onclick="resetCalc()">다시 계산하기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
